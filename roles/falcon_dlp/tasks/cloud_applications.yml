---
# Manage CrowdStrike DLP Cloud Applications

- name: Query existing cloud applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.cloud_applications_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _cloud_applications_query
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _cloud_applications_query is succeeded

- name: Fetch existing cloud application details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.cloud_applications_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _existing_cloud_applications_raw
  loop: "{{ _cloud_applications_query.json.resources }}"
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _existing_cloud_applications_raw is succeeded

- name: Aggregate existing cloud application details
  ansible.builtin.set_fact:
    _existing_cloud_applications:
      json:
        resources: "{{ (_existing_cloud_applications_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"

- name: Build existing cloud applications lookup
  ansible.builtin.set_fact:
    _existing_cloud_apps_list: "{{ _existing_cloud_applications.json.resources | default([]) }}"
    _existing_cloud_apps_by_name: >-
      {{
        dict(
          (_existing_cloud_applications.json.resources | default([])) |
          map(attribute='name') |
          zip(_existing_cloud_applications.json.resources | default([]))
        )
      }}

- name: Determine cloud applications to create
  ansible.builtin.set_fact:
    _cloud_apps_to_create: >-
      {{
        falcon_dlp_cloud_applications |
        selectattr('name', 'defined') |
        rejectattr('name', 'in', _existing_cloud_apps_by_name.keys() | list) |
        list
      }}

- name: Determine cloud applications to update
  ansible.builtin.set_fact:
    _cloud_apps_to_update: >-
      {{
        falcon_dlp_cloud_applications |
        selectattr('name', 'defined') |
        selectattr('name', 'in', _existing_cloud_apps_by_name.keys() | list) |
        list
      }}

- name: Determine cloud applications to delete
  ansible.builtin.set_fact:
    _cloud_apps_to_delete: >-
      {{
        _existing_cloud_apps_list |
        rejectattr('name', 'in', falcon_dlp_cloud_applications | map(attribute='name') | list) |
        rejectattr('system_defined', 'equalto', true) |
        list
      }}

- name: Display cloud application changes summary
  ansible.builtin.debug:
    msg: |
      Cloud Application Changes:
        To Create: {{ _cloud_apps_to_create | map(attribute='name') | list | join(', ') or 'None' }}
        To Update: {{ _cloud_apps_to_update | map(attribute='name') | list | join(', ') or 'None' }}
        To Delete: {{ _cloud_apps_to_delete | map(attribute='name') | list | join(', ') or 'None' }}
        State Mode: {{ falcon_dlp_state_mode }}

- name: Create new cloud applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.cloud_applications_entities }}"
    method: POST
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200, 201]
    body_format: json
    body:
      resources:
        - name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          urls: "{{ item.urls | default([]) }}"
  loop: "{{ _cloud_apps_to_create }}"
  loop_control:
    label: "{{ item.name }}"
  register: _create_cloud_apps_result
  when:
    - _cloud_apps_to_create | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].create | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _create_cloud_apps_result is succeeded

- name: Update existing cloud applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.cloud_applications_entities }}"
    method: PATCH
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      resources:
        - id: "{{ _existing_cloud_apps_by_name[item.name].id }}"
          name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          urls: "{{ item.urls | default([]) }}"
  loop: "{{ _cloud_apps_to_update }}"
  loop_control:
    label: "{{ item.name }}"
  register: _update_cloud_apps_result
  when:
    - _cloud_apps_to_update | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].update | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _update_cloud_apps_result is succeeded

- name: Delete orphaned cloud applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.cloud_applications_entities }}"
    method: DELETE
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      ids:
        - "{{ item.id }}"
  loop: "{{ _cloud_apps_to_delete }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_cloud_apps_result
  when:
    - _cloud_apps_to_delete | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].delete | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _delete_cloud_apps_result is succeeded

- name: Record cloud application changes
  ansible.builtin.set_fact:
    _falcon_dlp_changes: >-
      {{
        _falcon_dlp_changes | default({}) | combine({
          'cloud_applications': {
            'created': (_create_cloud_apps_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'updated': (_update_cloud_apps_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'deleted': (_delete_cloud_apps_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].delete else [],
            'would_create': _cloud_apps_to_create | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'would_update': _cloud_apps_to_update | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'would_delete': _cloud_apps_to_delete | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].delete else []
          }
        })
      }}
