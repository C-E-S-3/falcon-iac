---
# Export current CrowdStrike Falcon DLP state as IaC-feedable YAML.
# One file per entity type is written into falcon_dlp_export_dir.
# Only user-defined entries are emitted; system-defined entries are
# listed in each file's comment header for reference.

- name: Ensure export directory exists
  ansible.builtin.file:
    path: "{{ falcon_dlp_export_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost

- name: Build ID-to-name lookup maps for reference resolution
  ansible.builtin.set_fact:
    _content_patterns_by_id: >-
      {{
        dict(
          (_existing_patterns_list | default([])) | map(attribute='id') |
          zip((_existing_patterns_list | default([])) | map(attribute='name'))
        )
      }}
    _sensitivity_labels_by_id: >-
      {{
        dict(
          (_existing_labels_list | default([])) | map(attribute='id') |
          zip((_existing_labels_list | default([])) | map(attribute='name'))
        )
      }}
    _web_locations_by_id: >-
      {{
        dict(
          (_existing_web_locations_list | default([])) | map(attribute='id') |
          zip((_existing_web_locations_list | default([])) | map(attribute='name'))
        )
      }}
    _classifications_by_id: >-
      {{
        dict(
          (_existing_classifications_list | default([])) | map(attribute='id') |
          zip((_existing_classifications_list | default([])) | map(attribute='name'))
        )
      }}
    _local_apps_by_id: >-
      {{
        dict(
          (_existing_local_apps_list | default([])) | map(attribute='id') |
          zip((_existing_local_apps_list | default([])) | map(attribute='name'))
        )
      }}

# The role's main classification (_existing_X_system / _existing_X_user) is
# fail-safe for delete: missing system_defined => treated as system =>
# protected. For export, we want the opposite bias -- include anything that
# isn't *explicitly* flagged system_defined: true, so user-managed entries
# missing the attribute are visible for cherry-picking. Compute strict
# partitions here, used only by the export templates.
- name: Compute strict system/user partitions for state export
  ansible.builtin.set_fact:
    # Strictly system: explicit system_defined: true. Shown in header.
    _truly_system_patterns: "{{ (_existing_patterns_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_labels: "{{ (_existing_labels_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_web_locations: "{{ (_existing_web_locations_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_cloud_apps: "{{ (_existing_cloud_apps_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_enterprise_accounts: "{{ (_existing_enterprise_accounts_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_local_apps: "{{ (_existing_local_apps_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_local_app_groups: "{{ (_existing_local_app_groups_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_classifications: "{{ (_existing_classifications_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"
    _truly_system_policies: "{{ (_existing_policies_list | default([])) | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list }}"

- name: "Compute exportable partitions (anything not explicitly system_defined: true)"
  ansible.builtin.set_fact:
    _for_export_patterns: >-
      {{ ((_existing_patterns_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_patterns_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_labels: >-
      {{ ((_existing_labels_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_labels_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_web_locations: >-
      {{ ((_existing_web_locations_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_web_locations_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_cloud_apps: >-
      {{ ((_existing_cloud_apps_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_cloud_apps_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_enterprise_accounts: >-
      {{ ((_existing_enterprise_accounts_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_enterprise_accounts_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_local_apps: >-
      {{ ((_existing_local_apps_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_local_apps_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_local_app_groups: >-
      {{ ((_existing_local_app_groups_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_local_app_groups_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_classifications: >-
      {{ ((_existing_classifications_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_classifications_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}
    _for_export_policies: >-
      {{ ((_existing_policies_list | default([])) | rejectattr('system_defined', 'defined') | list)
         + ((_existing_policies_list | default([])) | selectattr('system_defined', 'defined') | rejectattr('system_defined', 'equalto', true) | list) }}

- name: Render content patterns export
  ansible.builtin.template:
    src: export_content_patterns.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/content_patterns.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_patterns_list is defined

- name: Render sensitivity labels export
  ansible.builtin.template:
    src: export_sensitivity_labels.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/sensitivity_labels.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_labels_list is defined

- name: Render web locations export
  ansible.builtin.template:
    src: export_web_locations.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/web_locations.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_web_locations_list is defined

- name: Render cloud applications export
  ansible.builtin.template:
    src: export_cloud_applications.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/cloud_applications.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_cloud_apps_list is defined

- name: Render enterprise accounts export
  ansible.builtin.template:
    src: export_enterprise_accounts.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/enterprise_accounts.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_enterprise_accounts_list is defined

- name: Render local applications export
  ansible.builtin.template:
    src: export_local_applications.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/local_applications.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_local_apps_list is defined

- name: Render local application groups export
  ansible.builtin.template:
    src: export_local_application_groups.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/local_application_groups.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_local_app_groups_list is defined

- name: Render classifications export
  ansible.builtin.template:
    src: export_classifications.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/classifications.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_classifications_list is defined

- name: Render policies export
  ansible.builtin.template:
    src: export_policies.yml.j2
    dest: "{{ falcon_dlp_export_dir }}/policies.yml"
    mode: '0644'
  delegate_to: localhost
  when: _existing_policies_list is defined

- name: Show state export summary
  ansible.builtin.debug:
    msg: |
      Current state exported to: {{ falcon_dlp_export_dir }}
      Files written:
        - content_patterns.yml          ({{ _for_export_patterns | default([]) | length }} user / {{ _truly_system_patterns | default([]) | length }} system)
        - sensitivity_labels.yml        ({{ _for_export_labels | default([]) | length }} user / {{ _truly_system_labels | default([]) | length }} system)
        - web_locations.yml             ({{ _for_export_web_locations | default([]) | length }} user / {{ _truly_system_web_locations | default([]) | length }} system)
        - cloud_applications.yml        ({{ _for_export_cloud_apps | default([]) | length }} user / {{ _truly_system_cloud_apps | default([]) | length }} system)
        - enterprise_accounts.yml       ({{ _for_export_enterprise_accounts | default([]) | length }} user / {{ _truly_system_enterprise_accounts | default([]) | length }} system)
        - local_applications.yml        ({{ _for_export_local_apps | default([]) | length }} user / {{ _truly_system_local_apps | default([]) | length }} system)
        - local_application_groups.yml  ({{ _for_export_local_app_groups | default([]) | length }} user / {{ _truly_system_local_app_groups | default([]) | length }} system)
        - classifications.yml           ({{ _for_export_classifications | default([]) | length }} user / {{ _truly_system_classifications | default([]) | length }} system)
        - policies.yml                  ({{ _for_export_policies | default([]) | length }} user / {{ _truly_system_policies | default([]) | length }} system)
      Copy desired entries into {{ falcon_dlp_policies_dir }}/ to bring them under IaC management.
