---
# Manage CrowdStrike DLP Local Application Groups

- name: Query existing local application groups
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_application_groups_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _local_app_groups_query
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _local_app_groups_query is succeeded

- name: Fetch existing local application group details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_application_groups_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _existing_local_app_groups_raw
  loop: "{{ _local_app_groups_query.json.resources }}"
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _existing_local_app_groups_raw is succeeded

- name: Aggregate existing local application group details
  ansible.builtin.set_fact:
    _existing_local_app_groups:
      json:
        resources: "{{ (_existing_local_app_groups_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"

- name: Build existing local application groups lookup
  ansible.builtin.set_fact:
    _existing_local_app_groups_list: "{{ _existing_local_app_groups.json.resources | default([]) }}"
    _existing_local_app_groups_by_name: >-
      {{
        dict(
          (_existing_local_app_groups.json.resources | default([])) |
          map(attribute='name') |
          zip(_existing_local_app_groups.json.resources | default([]))
        )
      }}

- name: Classify existing local application groups by system vs user
  ansible.builtin.set_fact:
    _existing_local_app_groups_system: >-
      {{
        (_existing_local_app_groups_list | rejectattr('system_defined', 'defined') | list)
        + (_existing_local_app_groups_list | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list)
      }}
    _existing_local_app_groups_user: >-
      {{
        _existing_local_app_groups_list
        | selectattr('system_defined', 'defined')
        | rejectattr('system_defined', 'equalto', true)
        | list
      }}

- name: Show protected (system-defined) local application groups
  ansible.builtin.debug:
    msg: "Protected from deletion ({{ _existing_local_app_groups_system | length }}): {{ _existing_local_app_groups_system | map(attribute='name') | list }}"
  when: _existing_local_app_groups_system | length > 0

# Resolve local application names to IDs
- name: Build resolved local application groups
  ansible.builtin.set_fact:
    _resolved_local_app_groups: "{{ _resolved_groups_temp }}"
  vars:
    _resolved_groups_temp: >-
      {%- set result = [] -%}
      {%- for grp in falcon_dlp_local_application_groups -%}
        {%- set app_ids = [] -%}
        {%- for aname in grp.applications | default([]) -%}
          {%- if aname in (_falcon_local_applications_by_name | default({})) -%}
            {%- set _ = app_ids.append(_falcon_local_applications_by_name[aname].id) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set resolved_grp = grp | combine({
          'application_ids': app_ids
        }) -%}
        {%- set _ = result.append(resolved_grp) -%}
      {%- endfor -%}
      {{ result }}

- name: Determine local application groups to create
  ansible.builtin.set_fact:
    _local_app_groups_to_create: >-
      {{
        _resolved_local_app_groups |
        selectattr('name', 'defined') |
        rejectattr('name', 'in', _existing_local_app_groups_by_name.keys() | list) |
        list
      }}

- name: Determine local application groups to update
  ansible.builtin.set_fact:
    _local_app_groups_to_update: >-
      {{
        _resolved_local_app_groups |
        selectattr('name', 'defined') |
        selectattr('name', 'in', _existing_local_app_groups_by_name.keys() | list) |
        list
      }}

- name: Determine local application groups to delete
  ansible.builtin.set_fact:
    _local_app_groups_to_delete: >-
      {{
        _existing_local_app_groups_user
        | rejectattr('name', 'in', falcon_dlp_local_application_groups | map(attribute='name') | list)
        | list
      }}

- name: Display local application group changes summary
  ansible.builtin.debug:
    msg: |
      Local Application Group Changes:
        To Create: {{ _local_app_groups_to_create | map(attribute='name') | list | join(', ') or 'None' }}
        To Update: {{ _local_app_groups_to_update | map(attribute='name') | list | join(', ') or 'None' }}
        To Delete: {{ _local_app_groups_to_delete | map(attribute='name') | list | join(', ') or 'None' }}
        State Mode: {{ falcon_dlp_state_mode }}

- name: Create new local application groups
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_application_groups_entities }}"
    method: POST
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200, 201]
    body_format: json
    body:
      resources:
        - name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          applications: "{{ item.application_ids | default([]) }}"
  loop: "{{ _local_app_groups_to_create }}"
  loop_control:
    label: "{{ item.name }}"
  register: _create_local_app_groups_result
  when:
    - _local_app_groups_to_create | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].create | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _create_local_app_groups_result is succeeded

- name: Update existing local application groups
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_application_groups_entities }}"
    method: PATCH
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      resources:
        - id: "{{ _existing_local_app_groups_by_name[item.name].id }}"
          name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          applications: "{{ item.application_ids | default([]) }}"
  loop: "{{ _local_app_groups_to_update }}"
  loop_control:
    label: "{{ item.name }}"
  register: _update_local_app_groups_result
  when:
    - _local_app_groups_to_update | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].update | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _update_local_app_groups_result is succeeded

- name: Refuse to delete any system-defined local application groups
  ansible.builtin.assert:
    that:
      - >-
        _local_app_groups_to_delete
        | selectattr('system_defined', 'defined')
        | selectattr('system_defined', 'equalto', true)
        | list | length == 0
    fail_msg: "BUG: system-defined local application groups reached the delete list — refusing to proceed"
  when: _local_app_groups_to_delete | length > 0

- name: Delete orphaned local application groups
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_application_groups_entities }}"
    method: DELETE
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      ids:
        - "{{ item.id }}"
  loop: "{{ _local_app_groups_to_delete }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_local_app_groups_result
  when:
    - _local_app_groups_to_delete | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].delete | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _delete_local_app_groups_result is succeeded

- name: Record local application group changes
  ansible.builtin.set_fact:
    _falcon_dlp_changes: >-
      {{
        _falcon_dlp_changes | default({}) | combine({
          'local_application_groups': {
            'created': (_create_local_app_groups_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'updated': (_update_local_app_groups_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'deleted': (_delete_local_app_groups_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].delete else [],
            'would_create': _local_app_groups_to_create | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'would_update': _local_app_groups_to_update | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'would_delete': _local_app_groups_to_delete | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].delete else []
          }
        })
      }}
