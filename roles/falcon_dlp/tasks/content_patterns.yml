---
# Manage CrowdStrike DLP Content Patterns

- name: Query existing content patterns
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _content_patterns_query
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _content_patterns_query is succeeded

- name: Fetch existing content pattern details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _existing_content_patterns_raw
  loop: "{{ _content_patterns_query.json.resources }}"
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _existing_content_patterns_raw is succeeded

- name: Aggregate existing content pattern details
  ansible.builtin.set_fact:
    _existing_content_patterns:
      json:
        resources: "{{ (_existing_content_patterns_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"

- name: Build existing content patterns lookup
  ansible.builtin.set_fact:
    _existing_patterns_list: "{{ _existing_content_patterns.json.resources | default([]) }}"
    _existing_patterns_by_name: >-
      {{
        dict(
          (_existing_content_patterns.json.resources | default([])) |
          map(attribute='name') |
          zip(_existing_content_patterns.json.resources | default([]))
        )
      }}

- name: Classify existing content patterns by system vs user
  ansible.builtin.set_fact:
    _existing_patterns_system: >-
      {{
        (_existing_patterns_list | rejectattr('system_defined', 'defined') | list)
        + (_existing_patterns_list | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list)
      }}
    _existing_patterns_user: >-
      {{
        _existing_patterns_list
        | selectattr('system_defined', 'defined')
        | rejectattr('system_defined', 'equalto', true)
        | list
      }}

- name: Show protected (system-defined) content patterns
  ansible.builtin.debug:
    msg: "Protected from deletion ({{ _existing_patterns_system | length }}): {{ _existing_patterns_system | map(attribute='name') | list }}"
  when: _existing_patterns_system | length > 0

- name: Determine content patterns to create
  ansible.builtin.set_fact:
    _patterns_to_create: >-
      {{
        falcon_dlp_content_patterns |
        selectattr('name', 'defined') |
        rejectattr('name', 'in', _existing_patterns_by_name.keys() | list) |
        list
      }}

- name: Determine content patterns to update
  ansible.builtin.set_fact:
    _patterns_to_update: >-
      {{
        falcon_dlp_content_patterns |
        selectattr('name', 'defined') |
        selectattr('name', 'in', _existing_patterns_by_name.keys() | list) |
        list
      }}

- name: Determine content patterns to delete
  ansible.builtin.set_fact:
    _patterns_to_delete: >-
      {{
        _existing_patterns_user
        | rejectattr('name', 'in', falcon_dlp_content_patterns | map(attribute='name') | list)
        | list
      }}

- name: Display content pattern changes summary
  ansible.builtin.debug:
    msg: |
      Content Patterns Changes:
        To Create: {{ _patterns_to_create | map(attribute='name') | list | join(', ') or 'None' }}
        To Update: {{ _patterns_to_update | map(attribute='name') | list | join(', ') or 'None' }}
        To Delete: {{ _patterns_to_delete | map(attribute='name') | list | join(', ') or 'None' }}
        State Mode: {{ falcon_dlp_state_mode }}

# Create new content patterns.
#
# The body is built as a single native Jinja2 expression (rather than a
# YAML mapping of templated string scalars) so that list and int fields
# -- regexes, min_match_threshold -- are passed to the API as JSON
# arrays/numbers, not as their string representations. Wrapping each
# value in "{{ ... }}" coerces it to a string under Ansible's default
# (non-native) Jinja2 templating, which corrupts the body and can make
# CrowdStrike return misleading errors like "content pattern name is
# required" because validation aborts before reaching the name check.
- name: Show raw item + rendered JSON body before each POST (debug)
  ansible.builtin.debug:
    msg: |
      ----- item from _patterns_to_create -----
      item.name                = {{ item.name | default('<MISSING>') | to_json }}
      item.description         = {{ item.description | default('<MISSING>') | to_json }}
      item.regexes             = {{ item.regexes | default('<MISSING>') | to_json }}
      item.min_match_threshold = {{ item.min_match_threshold | default('<MISSING>') | to_json }}
      item (full)              = {{ item | to_json }}

      ----- JSON body about to be sent to CrowdStrike -----
      {{ {'resources': [{'name': item.name, 'description': item.description | default(''), 'category': item.category | default('custom'), 'region': item.region | default('global'), 'min_match_threshold': item.min_match_threshold | default(1) | int, 'regexes': item.regexes | default([]), 'example': item.example | default('')}]} | to_nice_json }}
  loop: "{{ _patterns_to_create }}"
  loop_control:
    label: "{{ item.name | default('<missing-name>') }}"
  when:
    - falcon_dlp_debug | default(false) | bool
    - _patterns_to_create | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].create | bool

# Body is built with `to_json` to a string and sent as raw, which
# bypasses any uri-module argument type coercion that strips list/int
# types when running under Ansible's default (non-native) Jinja2 mode.
# Content-Type: application/json is set in _falcon_auth_headers.
#
# Accept 4xx codes and use ignore_errors so the play continues past
# this task long enough for the response-dump task below to fire.
- name: Create new content patterns
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_entities }}"
    method: POST
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    body_format: raw
    body: "{{ {'resources': [{'name': item.name, 'description': item.description | default(''), 'category': item.category | default('custom'), 'region': item.region | default('global'), 'min_match_threshold': item.min_match_threshold | default(1) | int, 'regexes': item.regexes | default([]), 'example': item.example | default('')}]} | to_json }}"
    return_content: true
    status_code: [200, 201, 400, 401, 403, 409, 422, 500]
  loop: "{{ _patterns_to_create }}"
  loop_control:
    label: "{{ item.name }}"
  register: _create_patterns_result
  when:
    - _patterns_to_create | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].create | bool
  ignore_errors: true

- name: "[DIAG] Full API response for every content pattern create attempt"
  ansible.builtin.debug:
    msg: |
      ==================== {{ item.item.name | default('?') }} ====================
      HTTP status : {{ item.status | default('n/a') }}
      url         : {{ item.url | default('n/a') }}
      response.json (parsed):
        {{ item.json | default('<no json>') | to_nice_json | indent(8) }}
      response.content (raw, first 800 chars):
        {{ (item.content | default('<no body>'))[:800] }}
  loop: "{{ _create_patterns_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('?') }}"
  when:
    - _create_patterns_result is defined
    - _create_patterns_result.results is defined

- name: Fail the play if any content pattern create returned non-2xx
  ansible.builtin.fail:
    msg: >-
      {{ _create_patterns_result.results
         | selectattr('status', 'defined')
         | rejectattr('status', 'in', [200, 201])
         | map(attribute='item.name') | list }}
      failed to create. See the [DIAG] output above for the full API response.
  when:
    - _create_patterns_result.results is defined
    - (_create_patterns_result.results | selectattr('status', 'defined') | rejectattr('status', 'in', [200, 201]) | list | length) > 0

# Update existing content patterns
- name: Update existing content patterns
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_entities }}"
    method: PATCH
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      resources:
        - id: "{{ _existing_patterns_by_name[item.name].id }}"
          name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          category: "{{ item.category | default('custom') }}"
          region: "{{ item.region | default('global') }}"
          min_match_threshold: "{{ item.min_match_threshold | default(1) }}"
          regexes: "{{ item.regexes | default([]) }}"
          example: "{{ item.example | default('') }}"
  loop: "{{ _patterns_to_update }}"
  loop_control:
    label: "{{ item.name }}"
  register: _update_patterns_result
  when:
    - _patterns_to_update | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].update | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _update_patterns_result is succeeded

# Delete orphaned content patterns
- name: Refuse to delete any system-defined content patterns
  ansible.builtin.assert:
    that:
      - >-
        _patterns_to_delete
        | selectattr('system_defined', 'defined')
        | selectattr('system_defined', 'equalto', true)
        | list | length == 0
    fail_msg: "BUG: system-defined content patterns reached the delete list — refusing to proceed"
  when: _patterns_to_delete | length > 0

- name: Delete orphaned content patterns
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_entities }}"
    method: DELETE
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      ids:
        - "{{ item.id }}"
  loop: "{{ _patterns_to_delete }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_patterns_result
  when:
    - _patterns_to_delete | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].delete | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _delete_patterns_result is succeeded

# Refresh content patterns lookup after changes
- name: Re-query content patterns after changes
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _content_patterns_query_refresh
  when: >
    (_patterns_to_create | length > 0 and _falcon_state_actions[falcon_dlp_state_mode].create) or
    (_patterns_to_delete | length > 0 and _falcon_state_actions[falcon_dlp_state_mode].delete)

- name: Fetch refreshed content pattern details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.content_patterns_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _refreshed_content_patterns_raw
  loop: "{{ _content_patterns_query_refresh.json.resources | default([]) }}"
  when:
    - _content_patterns_query_refresh is defined
    - _content_patterns_query_refresh.json.resources | default([]) | length > 0

- name: Aggregate refreshed content pattern details
  ansible.builtin.set_fact:
    _refreshed_content_patterns:
      json:
        resources: "{{ (_refreshed_content_patterns_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"
  when:
    - _content_patterns_query_refresh is defined
    - _content_patterns_query_refresh.json.resources | default([]) | length > 0

- name: Update content patterns lookup maps
  ansible.builtin.set_fact:
    _falcon_content_patterns: "{{ _refreshed_content_patterns.json.resources | default(_existing_patterns_list) }}"
    _falcon_content_patterns_by_name: >-
      {{
        dict(
          (_refreshed_content_patterns.json.resources | default(_existing_patterns_list)) |
          map(attribute='name') |
          zip(_refreshed_content_patterns.json.resources | default(_existing_patterns_list))
        )
      }}
    _falcon_content_patterns_by_id: >-
      {{
        dict(
          (_refreshed_content_patterns.json.resources | default(_existing_patterns_list)) |
          map(attribute='id') |
          zip(_refreshed_content_patterns.json.resources | default(_existing_patterns_list))
        )
      }}

# Record changes for summary report
- name: Record content pattern changes
  ansible.builtin.set_fact:
    _falcon_dlp_changes: >-
      {{
        _falcon_dlp_changes | default({}) | combine({
          'content_patterns': {
            'created': (_create_patterns_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'updated': (_update_patterns_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'deleted': (_delete_patterns_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].delete else [],
            'would_create': _patterns_to_create | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'would_update': _patterns_to_update | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'would_delete': _patterns_to_delete | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].delete else []
          }
        })
      }}
