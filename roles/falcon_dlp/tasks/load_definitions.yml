  when: _sensitivity_label_files.files | length > 0

- name: Merge sensitivity label definitions
  ansible.builtin.set_fact:
    falcon_dlp_sensitivity_labels: >-
      {{
        falcon_dlp_sensitivity_labels | default([]) +
        (lookup('vars', '_lbl_' + item.path | hash('md5'), default={}).falcon_dlp_sensitivity_labels | default([]))
      }}
  loop: "{{ _sensitivity_label_files.files }}"
  when: _sensitivity_label_files.files | length > 0

- name: Load web location definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_web_{{ item.path | hash('md5') }}"
  loop: "{{ _web_location_files.files }}"
  when: _web_location_files.files | length > 0

- name: Merge web location definitions
  ansible.builtin.set_fact:
    falcon_dlp_web_locations: >-
      {{
        falcon_dlp_web_locations | default([]) +
        (lookup('vars', '_web_' + item.path | hash('md5'), default={}).falcon_dlp_web_locations | default([]))
      }}
  loop: "{{ _web_location_files.files }}"
  when: _web_location_files.files | length > 0

- name: Load cloud application definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_capp_{{ item.path | hash('md5') }}"
  loop: "{{ _cloud_application_files.files }}"
  when: _cloud_application_files.files | length > 0

- name: Merge cloud application definitions
  ansible.builtin.set_fact:
    falcon_dlp_cloud_applications: >-
      {{
        falcon_dlp_cloud_applications | default([]) +
        (lookup('vars', '_capp_' + item.path | hash('md5'), default={}).falcon_dlp_cloud_applications | default([]))
      }}
  loop: "{{ _cloud_application_files.files }}"
  when: _cloud_application_files.files | length > 0

- name: Load local application definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_lapp_{{ item.path | hash('md5') }}"
  loop: "{{ _local_application_files.files }}"
  when: _local_application_files.files | length > 0

- name: Merge local application definitions
  ansible.builtin.set_fact:
    falcon_dlp_local_applications: >-
      {{
        falcon_dlp_local_applications | default([]) +
        (lookup('vars', '_lapp_' + item.path | hash('md5'), default={}).falcon_dlp_local_applications | default([]))
      }}
  loop: "{{ _local_application_files.files }}"
  when: _local_application_files.files | length > 0

- name: Load local application group definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_lag_{{ item.path | hash('md5') }}"
  loop: "{{ _local_application_group_files.files }}"
  when: _local_application_group_files.files | length > 0

- name: Merge local application group definitions
  ansible.builtin.set_fact:
    falcon_dlp_local_application_groups: >-
      {{
        falcon_dlp_local_application_groups | default([]) +
        (lookup('vars', '_lag_' + item.path | hash('md5'), default={}).falcon_dlp_local_application_groups | default([]))
      }}
  loop: "{{ _local_application_group_files.files }}"
  when: _local_application_group_files.files | length > 0

- name: Load enterprise account definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_ent_{{ item.path | hash('md5') }}"
  loop: "{{ _enterprise_account_files.files }}"
  when: _enterprise_account_files.files | length > 0

- name: Merge enterprise account definitions
  ansible.builtin.set_fact:
    falcon_dlp_enterprise_accounts: >-
      {{
        falcon_dlp_enterprise_accounts | default([]) +
        (lookup('vars', '_ent_' + item.path | hash('md5'), default={}).falcon_dlp_enterprise_accounts | default([]))
      }}
  loop: "{{ _enterprise_account_files.files }}"
  when: _enterprise_account_files.files | length > 0

# Initialize empty lists if no files found
- name: Initialize empty definition lists
  ansible.builtin.set_fact:
    falcon_dlp_classifications: "{{ falcon_dlp_classifications | default([]) }}"
    falcon_dlp_policies: "{{ falcon_dlp_policies | default([]) }}"
    falcon_dlp_content_patterns: "{{ falcon_dlp_content_patterns | default([]) }}"
    falcon_dlp_sensitivity_labels: "{{ falcon_dlp_sensitivity_labels | default([]) }}"
    falcon_dlp_web_locations: "{{ falcon_dlp_web_locations | default([]) }}"
    falcon_dlp_cloud_applications: "{{ falcon_dlp_cloud_applications | default([]) }}"
    falcon_dlp_local_applications: "{{ falcon_dlp_local_applications | default([]) }}"
    falcon_dlp_local_application_groups: "{{ falcon_dlp_local_application_groups | default([]) }}"
    falcon_dlp_enterprise_accounts: "{{ falcon_dlp_enterprise_accounts | default([]) }}"

- name: Display loaded definitions summary
  ansible.builtin.debug:
    msg: |
      Loaded DLP Definitions:
        Classifications: {{ falcon_dlp_classifications | length }}
        Policies: {{ falcon_dlp_policies | length }}
        Content Patterns: {{ falcon_dlp_content_patterns | length }}
        Sensitivity Labels: {{ falcon_dlp_sensitivity_labels | length }}
        Web Locations: {{ falcon_dlp_web_locations | length }}
        Cloud Applications: {{ falcon_dlp_cloud_applications | length }}
        Local Applications: {{ falcon_dlp_local_applications | length }}
        Local Application Groups: {{ falcon_dlp_local_application_groups | length }}
        Enterprise Accounts: {{ falcon_dlp_enterprise_accounts | length }}
  when: falcon_dlp_debug | bool
