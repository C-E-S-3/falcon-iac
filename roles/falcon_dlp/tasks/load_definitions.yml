---
# Load DLP policy definitions from YAML files

- name: Find all classification definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/classifications"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _classification_files
  delegate_to: localhost

- name: Find all policy definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/policies"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _policy_files
  delegate_to: localhost

- name: Find all content pattern definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/content_patterns"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _content_pattern_files
  delegate_to: localhost

- name: Find all sensitivity label definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/sensitivity_labels"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _sensitivity_label_files
  delegate_to: localhost

- name: Find all web location definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/web_locations"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _web_location_files
  delegate_to: localhost

- name: Find all cloud application definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/cloud_applications"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _cloud_application_files
  delegate_to: localhost

- name: Find all local application definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/local_applications"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _local_application_files
  delegate_to: localhost

- name: Find all local application group definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/local_application_groups"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _local_application_group_files
  delegate_to: localhost

- name: Find all enterprise account definition files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ falcon_dlp_policies_dir }}/enterprise_accounts"
    patterns: "*.yml,*.yaml"
    recurse: true
  register: _enterprise_account_files
  delegate_to: localhost

# Load and merge all definitions
- name: Load classification definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_class_{{ item.path | hash('md5') }}"
  loop: "{{ _classification_files.files }}"
  when: _classification_files.files | length > 0

- name: Merge classification definitions
  ansible.builtin.set_fact:
    falcon_dlp_classifications: >-
      {{
        falcon_dlp_classifications | default([]) +
        (lookup('vars', '_class_' + item.path | hash('md5'), default={}).falcon_dlp_classifications | default([]))
      }}
  loop: "{{ _classification_files.files }}"
  when: _classification_files.files | length > 0

- name: Load policy definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_pol_{{ item.path | hash('md5') }}"
  loop: "{{ _policy_files.files }}"
  when: _policy_files.files | length > 0

- name: Merge policy definitions
  ansible.builtin.set_fact:
    falcon_dlp_policies: >-
      {{
        falcon_dlp_policies | default([]) +
        (lookup('vars', '_pol_' + item.path | hash('md5'), default={}).falcon_dlp_policies | default([]))
      }}
  loop: "{{ _policy_files.files }}"
  when: _policy_files.files | length > 0

- name: Load content pattern definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: "_pat_{{ item.path | hash('md5') }}"
  loop: "{{ _content_pattern_files.files }}"
  when: _content_pattern_files.files | length > 0

- name: Merge content pattern definitions
  ansible.builtin.set_fact:
    falcon_dlp_content_patterns: >-
      {{
        falcon_dlp_content_patterns | default([]) +
        (lookup('vars', '_pat_' + item.path | hash('md5'), default={}).falcon_dlp_content_patterns | default([]))
      }}
  loop: "{{ _content_pattern_files.files }}"
  when: _content_pattern_files.files | length > 0

- name: Load sensitivity label definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
