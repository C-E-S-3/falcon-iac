---
# Manage CrowdStrike DLP Local Applications

- name: Query existing local applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _local_applications_query
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _local_applications_query is succeeded

- name: Fetch existing local application details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _existing_local_applications_raw
  loop: "{{ _local_applications_query.json.resources }}"
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _existing_local_applications_raw is succeeded

- name: Aggregate existing local application details
  ansible.builtin.set_fact:
    _existing_local_applications:
      json:
        resources: "{{ (_existing_local_applications_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"

- name: Build existing local applications lookup
  ansible.builtin.set_fact:
    _existing_local_apps_list: "{{ _existing_local_applications.json.resources | default([]) }}"
    _existing_local_apps_by_name: >-
      {{
        dict(
          (_existing_local_applications.json.resources | default([])) |
          map(attribute='name') |
          zip(_existing_local_applications.json.resources | default([]))
        )
      }}

- name: Determine local applications to create
  ansible.builtin.set_fact:
    _local_apps_to_create: >-
      {{
        falcon_dlp_local_applications |
        selectattr('name', 'defined') |
        rejectattr('name', 'in', _existing_local_apps_by_name.keys() | list) |
        list
      }}

- name: Determine local applications to update
  ansible.builtin.set_fact:
    _local_apps_to_update: >-
      {{
        falcon_dlp_local_applications |
        selectattr('name', 'defined') |
        selectattr('name', 'in', _existing_local_apps_by_name.keys() | list) |
        list
      }}

- name: Determine local applications to delete
  ansible.builtin.set_fact:
    _local_apps_to_delete: >-
      {{
        _existing_local_apps_list |
        rejectattr('name', 'in', falcon_dlp_local_applications | map(attribute='name') | list) |
        rejectattr('system_defined', 'equalto', true) |
        list
      }}

- name: Display local application changes summary
  ansible.builtin.debug:
    msg: |
      Local Application Changes:
        To Create: {{ _local_apps_to_create | map(attribute='name') | list | join(', ') or 'None' }}
        To Update: {{ _local_apps_to_update | map(attribute='name') | list | join(', ') or 'None' }}
        To Delete: {{ _local_apps_to_delete | map(attribute='name') | list | join(', ') or 'None' }}
        State Mode: {{ falcon_dlp_state_mode }}

- name: Create new local applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_entities }}"
    method: POST
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200, 201]
    body_format: json
    body:
      resources:
        - name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          platform: "{{ item.platform | default('win') }}"
          paths: "{{ item.paths | default([]) }}"
          file_names: "{{ item.file_names | default([]) }}"
          sha256_hashes: "{{ item.sha256_hashes | default([]) }}"
  loop: "{{ _local_apps_to_create }}"
  loop_control:
    label: "{{ item.name }}"
  register: _create_local_apps_result
  when:
    - _local_apps_to_create | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].create | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _create_local_apps_result is succeeded

- name: Update existing local applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_entities }}"
    method: PATCH
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      resources:
        - id: "{{ _existing_local_apps_by_name[item.name].id }}"
          name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          platform: "{{ item.platform | default('win') }}"
          paths: "{{ item.paths | default([]) }}"
          file_names: "{{ item.file_names | default([]) }}"
          sha256_hashes: "{{ item.sha256_hashes | default([]) }}"
  loop: "{{ _local_apps_to_update }}"
  loop_control:
    label: "{{ item.name }}"
  register: _update_local_apps_result
  when:
    - _local_apps_to_update | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].update | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _update_local_apps_result is succeeded

- name: Delete orphaned local applications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_entities }}"
    method: DELETE
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      ids:
        - "{{ item.id }}"
  loop: "{{ _local_apps_to_delete }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_local_apps_result
  when:
    - _local_apps_to_delete | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].delete | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _delete_local_apps_result is succeeded

# Refresh local applications lookup
- name: Re-query local applications after changes
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _local_apps_query_refresh
  when: >
    (_local_apps_to_create | length > 0 and _falcon_state_actions[falcon_dlp_state_mode].create) or
    (_local_apps_to_delete | length > 0 and _falcon_state_actions[falcon_dlp_state_mode].delete)

- name: Fetch refreshed local application details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.local_applications_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _refreshed_local_apps_raw
  loop: "{{ _local_apps_query_refresh.json.resources | default([]) }}"
  when:
    - _local_apps_query_refresh is defined
    - _local_apps_query_refresh.json.resources | default([]) | length > 0

- name: Aggregate refreshed local application details
  ansible.builtin.set_fact:
    _refreshed_local_apps:
      json:
        resources: "{{ (_refreshed_local_apps_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"
  when:
    - _local_apps_query_refresh is defined
    - _local_apps_query_refresh.json.resources | default([]) | length > 0

- name: Update local applications lookup maps
  ansible.builtin.set_fact:
    _falcon_local_applications: "{{ _refreshed_local_apps.json.resources | default(_existing_local_apps_list) }}"
    _falcon_local_applications_by_name: >-
      {{
        dict(
          (_refreshed_local_apps.json.resources | default(_existing_local_apps_list)) |
          map(attribute='name') |
          zip(_refreshed_local_apps.json.resources | default(_existing_local_apps_list))
        )
      }}

- name: Record local application changes
  ansible.builtin.set_fact:
    _falcon_dlp_changes: >-
      {{
        _falcon_dlp_changes | default({}) | combine({
          'local_applications': {
            'created': (_create_local_apps_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'updated': (_update_local_apps_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'deleted': (_delete_local_apps_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].delete else [],
            'would_create': _local_apps_to_create | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'would_update': _local_apps_to_update | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'would_delete': _local_apps_to_delete | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].delete else []
          }
        })
      }}
