---
# Manage CrowdStrike DLP Classifications

- name: Query existing classifications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _classifications_query
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _classifications_query is succeeded

- name: Fetch existing classification details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _existing_classifications_raw
  loop: "{{ _classifications_query.json.resources }}"
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _existing_classifications_raw is succeeded

- name: Aggregate existing classification details
  ansible.builtin.set_fact:
    _existing_classifications:
      json:
        resources: "{{ (_existing_classifications_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"

- name: Build existing classifications lookup
  ansible.builtin.set_fact:
    _existing_classifications_list: "{{ _existing_classifications.json.resources | default([]) }}"
    _existing_classifications_by_name: >-
      {{
        dict(
          (_existing_classifications.json.resources | default([])) |
          map(attribute='name') |
          zip(_existing_classifications.json.resources | default([]))
        )
      }}

- name: Classify existing classifications by system vs user
  ansible.builtin.set_fact:
    _existing_classifications_system: >-
      {{
        (_existing_classifications_list | rejectattr('system_defined', 'defined') | list)
        + (_existing_classifications_list | selectattr('system_defined', 'defined') | selectattr('system_defined', 'equalto', true) | list)
      }}
    _existing_classifications_user: >-
      {{
        _existing_classifications_list
        | selectattr('system_defined', 'defined')
        | rejectattr('system_defined', 'equalto', true)
        | list
      }}

- name: Show protected (system-defined) classifications
  ansible.builtin.debug:
    msg: "Protected from deletion ({{ _existing_classifications_system | length }}): {{ _existing_classifications_system | map(attribute='name') | list }}"
  when: _existing_classifications_system | length > 0

# Resolve name references to IDs for classifications
- name: Build resolved classifications with ID references
  ansible.builtin.set_fact:
    _resolved_classifications: "{{ _resolved_classifications_temp | default([]) }}"
  vars:
    _resolved_classifications_temp: >-
      {%- set result = [] -%}
      {%- for cls in falcon_dlp_classifications -%}
        {%- set pattern_ids = [] -%}
        {%- for pname in cls.content_patterns | default([]) -%}
          {%- if pname in (_falcon_content_patterns_by_name | default({})) -%}
            {%- set _ = pattern_ids.append(_falcon_content_patterns_by_name[pname].id) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set file_type_ids = [] -%}
        {%- for ftname in cls.file_types | default([]) -%}
          {%- if ftname in (_falcon_file_types_by_name | default({})) -%}
            {%- set _ = file_type_ids.append(_falcon_file_types_by_name[ftname].id) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set label_ids = [] -%}
        {%- for lname in cls.sensitivity_labels | default([]) -%}
          {%- if lname in (_falcon_sensitivity_labels_by_name | default({})) -%}
            {%- set _ = label_ids.append(_falcon_sensitivity_labels_by_name[lname].id) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set resolved_rules = [] -%}
        {%- for rule in cls.rules | default([]) -%}
          {%- set web_loc_ids = [] -%}
          {%- for wname in rule.web_locations | default([]) -%}
            {%- if wname in (_falcon_web_locations_by_name | default({})) -%}
              {%- set _ = web_loc_ids.append(_falcon_web_locations_by_name[wname].id) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set resolved_rule = rule | combine({'web_location_ids': web_loc_ids}) -%}
          {%- set _ = resolved_rules.append(resolved_rule) -%}
        {%- endfor -%}
        {%- set resolved_cls = cls | combine({
          'content_pattern_ids': pattern_ids,
          'file_type_ids': file_type_ids,
          'sensitivity_label_ids': label_ids,
          'resolved_rules': resolved_rules
        }) -%}
        {%- set _ = result.append(resolved_cls) -%}
      {%- endfor -%}
      {{ result }}

- name: Determine classifications to create
  ansible.builtin.set_fact:
    _classifications_to_create: >-
      {{
        _resolved_classifications |
        selectattr('name', 'defined') |
        rejectattr('name', 'in', _existing_classifications_by_name.keys() | list) |
        list
      }}

- name: Determine classifications to update
  ansible.builtin.set_fact:
    _classifications_to_update: >-
      {{
        _resolved_classifications |
        selectattr('name', 'defined') |
        selectattr('name', 'in', _existing_classifications_by_name.keys() | list) |
        list
      }}

- name: Determine classifications to delete
  ansible.builtin.set_fact:
    _classifications_to_delete: >-
      {{
        _existing_classifications_user
        | rejectattr('name', 'in', falcon_dlp_classifications | map(attribute='name') | list)
        | list
      }}

- name: Display classification changes summary
  ansible.builtin.debug:
    msg: |
      Classification Changes:
        To Create: {{ _classifications_to_create | map(attribute='name') | list | join(', ') or 'None' }}
        To Update: {{ _classifications_to_update | map(attribute='name') | list | join(', ') or 'None' }}
        To Delete: {{ _classifications_to_delete | map(attribute='name') | list | join(', ') or 'None' }}
        State Mode: {{ falcon_dlp_state_mode }}

# Build classification API payload
- name: Create new classifications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_entities }}"
    method: POST
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200, 201]
    body_format: json
    body:
      resources:
        - name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          enabled: "{{ item.enabled | default(true) }}"
          content_patterns: "{{ item.content_pattern_ids | default([]) }}"
          file_types: "{{ item.file_type_ids | default([]) }}"
          sensitivity_labels: "{{ item.sensitivity_label_ids | default([]) }}"
          rules: >-
            {{
              item.resolved_rules | default([]) | map('combine', {}) |
              map('dict2items') |
              map('rejectattr', 'key', 'in', ['web_locations']) |
              map('items2dict') |
              list
            }}
  loop: "{{ _classifications_to_create }}"
  loop_control:
    label: "{{ item.name }}"
  register: _create_classifications_result
  when:
    - _classifications_to_create | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].create | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _create_classifications_result is succeeded

- name: Update existing classifications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_entities }}"
    method: PATCH
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      resources:
        - id: "{{ _existing_classifications_by_name[item.name].id }}"
          name: "{{ item.name }}"
          description: "{{ item.description | default('') }}"
          enabled: "{{ item.enabled | default(true) }}"
          content_patterns: "{{ item.content_pattern_ids | default([]) }}"
          file_types: "{{ item.file_type_ids | default([]) }}"
          sensitivity_labels: "{{ item.sensitivity_label_ids | default([]) }}"
          rules: >-
            {{
              item.resolved_rules | default([]) | map('combine', {}) |
              map('dict2items') |
              map('rejectattr', 'key', 'in', ['web_locations']) |
              map('items2dict') |
              list
            }}
  loop: "{{ _classifications_to_update }}"
  loop_control:
    label: "{{ item.name }}"
  register: _update_classifications_result
  when:
    - _classifications_to_update | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].update | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _update_classifications_result is succeeded

- name: Refuse to delete any system-defined classifications
  ansible.builtin.assert:
    that:
      - >-
        _classifications_to_delete
        | selectattr('system_defined', 'defined')
        | selectattr('system_defined', 'equalto', true)
        | list | length == 0
    fail_msg: "BUG: system-defined classifications reached the delete list — refusing to proceed"
  when: _classifications_to_delete | length > 0

- name: Delete orphaned classifications
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_entities }}"
    method: DELETE
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
    body_format: json
    body:
      ids:
        - "{{ item.id }}"
  loop: "{{ _classifications_to_delete }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_classifications_result
  when:
    - _classifications_to_delete | length > 0
    - _falcon_state_actions[falcon_dlp_state_mode].delete | bool
  retries: "{{ falcon_api_retries }}"
  delay: "{{ falcon_api_retry_delay }}"
  until: _delete_classifications_result is succeeded

# Refresh classifications lookup after changes
- name: Re-query classifications after changes
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_query }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _classifications_query_refresh
  when: >
    (_classifications_to_create | length > 0 and _falcon_state_actions[falcon_dlp_state_mode].create) or
    (_classifications_to_delete | length > 0 and _falcon_state_actions[falcon_dlp_state_mode].delete)

- name: Fetch refreshed classification details
  ansible.builtin.uri:
    url: "{{ falcon_base_url }}{{ _falcon_endpoints.classifications_entities }}?ids={{ item }}"
    method: GET
    headers: "{{ _falcon_auth_headers }}"
    timeout: "{{ falcon_api_timeout }}"
    status_code: [200]
  register: _refreshed_classifications_raw
  loop: "{{ _classifications_query_refresh.json.resources | default([]) }}"
  when:
    - _classifications_query_refresh is defined
    - _classifications_query_refresh.json.resources | default([]) | length > 0

- name: Aggregate refreshed classification details
  ansible.builtin.set_fact:
    _refreshed_classifications:
      json:
        resources: "{{ (_refreshed_classifications_raw.results | default([])) | map(attribute='json.resources') | flatten | list }}"
  when:
    - _classifications_query_refresh is defined
    - _classifications_query_refresh.json.resources | default([]) | length > 0

- name: Update classifications lookup maps
  ansible.builtin.set_fact:
    _falcon_classifications: "{{ _refreshed_classifications.json.resources | default(_existing_classifications_list) }}"
    _falcon_classifications_by_name: >-
      {{
        dict(
          (_refreshed_classifications.json.resources | default(_existing_classifications_list)) |
          map(attribute='name') |
          zip(_refreshed_classifications.json.resources | default(_existing_classifications_list))
        )
      }}
    _falcon_classifications_by_id: >-
      {{
        dict(
          (_refreshed_classifications.json.resources | default(_existing_classifications_list)) |
          map(attribute='id') |
          zip(_refreshed_classifications.json.resources | default(_existing_classifications_list))
        )
      }}

- name: Record classification changes
  ansible.builtin.set_fact:
    _falcon_dlp_changes: >-
      {{
        _falcon_dlp_changes | default({}) | combine({
          'classifications': {
            'created': (_create_classifications_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'updated': (_update_classifications_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'deleted': (_delete_classifications_result.results | default([]) | selectattr('changed', 'defined') | selectattr('changed') | map(attribute='item.name') | list) if _falcon_state_actions[falcon_dlp_state_mode].delete else [],
            'would_create': _classifications_to_create | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].create else [],
            'would_update': _classifications_to_update | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].update else [],
            'would_delete': _classifications_to_delete | map(attribute='name') | list if not _falcon_state_actions[falcon_dlp_state_mode].delete else []
          }
        })
      }}
