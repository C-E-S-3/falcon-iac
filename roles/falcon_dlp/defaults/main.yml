---
# CrowdStrike Falcon DLP Role - Default Variables

# Cloud region: us-1, us-2, eu-1, us-gov-1, us-gov-2
falcon_cloud: "us-1"

# State management mode:
#   report - drift detection only, no changes (default)
#   ignore - additive only, create/update but never delete
#   delete - full IaC reconciliation, will remove orphaned resources
falcon_dlp_state_mode: "report"

# Authentication credentials (prefer Ansible Vault)
# Falls back to environment variables if not set:
#   FALCON_CLIENT_ID, FALCON_CLIENT_SECRET
falcon_client_id: "{{ lookup('env', 'FALCON_CLIENT_ID') | default(omit, true) }}"
falcon_client_secret: "{{ lookup('env', 'FALCON_CLIENT_SECRET') | default(omit, true) }}"

# MSSP member CID (optional, for multi-tenant environments)
falcon_member_cid: ""

# Directory containing DLP policy definitions (relative to playbook)
falcon_dlp_policies_dir: "dlp_policies"

# Resource type toggles - set to false to skip specific resource types
falcon_dlp_manage_content_patterns: true
falcon_dlp_manage_classifications: true
falcon_dlp_manage_policies: true
falcon_dlp_manage_policy_precedence: true
falcon_dlp_manage_sensitivity_labels: true
falcon_dlp_manage_web_locations: true
falcon_dlp_manage_cloud_applications: true
falcon_dlp_manage_local_applications: true
falcon_dlp_manage_local_application_groups: true
falcon_dlp_manage_enterprise_accounts: true

# API request timeout (seconds)
falcon_api_timeout: 30

# Retry settings for API calls
falcon_api_retries: 3
falcon_api_retry_delay: 5

# Verbose output for debugging
falcon_dlp_debug: false

# JSON report output file (set to enable JSON output for CI/CD and SIEM)
# Example: falcon_dlp_report_file: "{{ playbook_dir }}/dlp_report.json"
falcon_dlp_report_file: ""

# Directory to write the current CrowdStrike DLP state as IaC-feedable YAML.
# When set, the report run produces one file per entity type containing the
# user-defined entries currently configured in the tenant. System-defined
# entries are listed in each file's comment header for reference but are
# excluded from the data (they are protected from modification by the role).
# Copy the entries you want to manage into your falcon_dlp_policies_dir
# (default: dlp_policies/) to bring them under IaC management.
# Example: falcon_dlp_export_dir: "{{ playbook_dir }}/dlp_current_state"
falcon_dlp_export_dir: ""
