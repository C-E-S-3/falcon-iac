name: DLP Configuration Report

on:
  pull_request:
    branches: [main]
    paths:
      - 'dlp_policies/**'
      - 'roles/**'
      - 'playbooks/**'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      state_mode:
        description: 'State mode (report, ignore, delete)'
        required: false
        default: 'report'
        type: choice
        options:
          - report
          - ignore
          - delete

env:
  FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
  FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
  FALCON_MEMBER_CID: ${{ secrets.FALCON_MEMBER_CID }}

jobs:
  dlp-report:
    name: DLP Configuration Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and jq
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Validate credentials are configured
        run: |
          if [ -z "$FALCON_CLIENT_ID" ] || [ -z "$FALCON_CLIENT_SECRET" ]; then
            echo "::error::FALCON_CLIENT_ID and FALCON_CLIENT_SECRET secrets must be configured"
            exit 1
          fi

      - name: Run DLP Report Playbook
        run: |
          STATE_MODE="${{ github.event.inputs.state_mode || 'report' }}"

          ansible-playbook playbooks/dlp_report.yml \
            -e falcon_dlp_state_mode=${STATE_MODE} \
            -e falcon_dlp_strict_mode=false \
            -e falcon_dlp_report_file="${PWD}/dlp_report.json"

      - name: Check for drift
        id: drift_check
        run: |
          # Read the JSON report
          HAS_DRIFT=$(jq -r '.result.has_drift' dlp_report.json)
          echo "has_drift=${HAS_DRIFT}" >> $GITHUB_OUTPUT

          # Extract summary counts
          WOULD_CREATE=$(jq -r '.result.summary.total_would_create' dlp_report.json)
          WOULD_UPDATE=$(jq -r '.result.summary.total_would_update' dlp_report.json)
          WOULD_DELETE=$(jq -r '.result.summary.total_would_delete' dlp_report.json)

          echo "would_create=${WOULD_CREATE}" >> $GITHUB_OUTPUT
          echo "would_update=${WOULD_UPDATE}" >> $GITHUB_OUTPUT
          echo "would_delete=${WOULD_DELETE}" >> $GITHUB_OUTPUT

      - name: Create Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # CrowdStrike Falcon DLP Report

          EOF

          HAS_DRIFT="${{ steps.drift_check.outputs.has_drift }}"

          if [ "$HAS_DRIFT" = "true" ] || [ "$HAS_DRIFT" = "True" ]; then
            echo "## ⚠️ Configuration Drift Detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No Configuration Drift" >> $GITHUB_STEP_SUMMARY
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF

          | Metric | Count |
          |--------|-------|
          | Would Create | ${{ steps.drift_check.outputs.would_create }} |
          | Would Update | ${{ steps.drift_check.outputs.would_update }} |
          | Would Delete | ${{ steps.drift_check.outputs.would_delete }} |

          ### Full Report

          \`\`\`json
          $(cat dlp_report.json)
          \`\`\`
          EOF

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dlp-report
          path: dlp_report.json
          retention-days: 30

      # Optional: Send to SIEM (uncomment and configure)
      # - name: Send report to SIEM
      #   if: always()
      #   run: |
      #     curl -X POST "${{ secrets.SIEM_ENDPOINT }}" \
      #       -H "Authorization: Bearer ${{ secrets.SIEM_TOKEN }}" \
      #       -H "Content-Type: application/json" \
      #       -d @dlp_report.json

      - name: Fail if drift detected
        if: steps.drift_check.outputs.has_drift == 'true' || steps.drift_check.outputs.has_drift == 'True'
        run: |
          echo "::error::DLP configuration drift detected. Review the job summary for details."
          exit 1
